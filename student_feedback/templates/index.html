<h2>Student Feedback System</h2>

<a href="/add">Add Feedback</a> |
<a href="/logout">Logout</a>

<table border="1">
<tr>
<th>Name</th><th>Email</th><th>Message</th><th>Action</th>
</tr>

{% for i in data %}
<tr>
<td>{{i['name']}}</td>
<td>{{i['email']}}</td>
<td>{{i['message']}}</td>
<td>
<a href="/edit/{{i['id']}}">Edit</a>
<a href="/delete/{{i['id']}}">Delete</a>
</td>
</tr>
{% endfor %}

</table>
